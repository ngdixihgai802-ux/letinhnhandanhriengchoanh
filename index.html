<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Valentine 14/3</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
background:black;
}

/* nền galaxy */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:url("https://i.imgur.com/9QZ7K8Q.png");
animation:galaxy 60s linear infinite;
opacity:0.4;
}

@keyframes galaxy{
0%{transform:translate(0,0)}
100%{transform:translate(-50%,-50%)}
}

.container{
margin-top:60px;
position:relative;
z-index:2;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
margin:5px;
cursor:pointer;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

.question{
display:none;
}

/* hộp quà */

#gift{
font-size:120px;
display:none;
animation:shake 0.7s infinite;
cursor:pointer;
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(-8deg)}
50%{transform:rotate(8deg)}
75%{transform:rotate(-8deg)}
100%{transform:rotate(0)}
}

/* thanh tiến trình */

.progress{
width:80%;
max-width:450px;
height:25px;
background:#333;
margin:auto;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#ff4d6d;
transition:0.1s;
}

/* phong bì */

#envelope{
display:none;
width:220px;
height:140px;
background:white;
margin:auto;
cursor:pointer;
position:relative;
border-radius:10px;
}

#envelope:before{
content:"";
position:absolute;
top:0;
left:0;
border-top:70px solid #ff4d6d;
border-left:110px solid transparent;
border-right:110px solid transparent;
}

/* thư */

#letter{
display:none;
background:white;
color:black;
padding:30px;
border-radius:20px;
width:90%;
max-width:750px;
margin:auto;
font-size:18px;
line-height:1.6;
}

/* tim bay */

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:fly 5s linear infinite;
}

@keyframes fly{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-110vh);opacity:0}
}

/* tim ghép */

#love{
display:none;
font-size:100px;
animation:pop 2s forwards;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

/* rung màn hình */

.shakeScreen{
animation:screenShake 0.5s;
}

@keyframes screenShake{
0%{transform:translate(0)}
25%{transform:translate(10px)}
50%{transform:translate(-10px)}
75%{transform:translate(10px)}
100%{transform:translate(0)}
}

/* pháo hoa */

.firework{
position:fixed;
width:8px;
height:8px;
background:yellow;
border-radius:50%;
animation:boom 1s forwards;
}

@keyframes boom{
0%{transform:scale(1)}
100%{transform:scale(30);opacity:0}
}

</style>
</head>

<body>

<div class="container">

<h1>💌 Valentine bí mật 💌</h1>

<div id="login">

<p>Nhập mật khẩu</p>

<input id="pass" type="password">

<br><br>

<button onclick="checkPass()">Vào</button>

</div>


<div id="gift">

🎁

<p>Nhấn 100 lần để mở quà</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>


<div id="love">💞</div>

<div id="envelope"></div>

<div id="letter">

<h2>💖 Gửi anh 💖</h2>

<p id="text"></p>

</div>

</div>


<script>

function checkPass(){

let p=document.getElementById("pass").value

if(p=="28070808"){

document.getElementById("login").style.display="none"
document.getElementById("gift").style.display="block"

}else{

alert("Sai mật khẩu rồi :<")

}

}

let clicks=0

document.getElementById("gift").onclick=function(){

clicks++

let percent=(clicks/100)*100

document.getElementById("bar").style.width=percent+"%"

if(clicks>=100){

fireworks()

document.body.classList.add("shakeScreen")

document.getElementById("gift").style.display="none"

document.getElementById("love").style.display="block"

setTimeout(()=>{

document.getElementById("envelope").style.display="block"

},2000)

}

}

/* pháo hoa full màn */

function fireworks(){

for(let i=0;i<80;i++){

let f=document.createElement("div")

f.className="firework"

f.style.left=Math.random()*100+"vw"

f.style.top=Math.random()*100+"vh"

document.body.appendChild(f)

setTimeout(()=>f.remove(),1000)

}

}

/* mở phong bì */

document.getElementById("envelope").onclick=function(){

document.getElementById("envelope").style.display="none"

document.getElementById("letter").style.display="block"

typeLetter()

}

/* nội dung thư */

let message=`Hôm nay là Valentine 14/3, ngày mà em muốn nói với anh những điều em vẫn luôn giữ trong lòng. Trong thế giới rộng lớn này, có hàng triệu người lướt qua nhau, nhưng thật may mắn vì em đã gặp được anh. Em vẫn luôn nghĩ rằng việc hai người gặp nhau, quen nhau rồi ở lại bên nhau không phải là chuyện hiển nhiên, nên đôi khi em cũng tự hỏi tại sao giữa rất nhiều người như vậy, em lại gặp đúng anh. Anh không phải kiểu người lãng mạn, cũng không giỏi nói những lời ngọt ngào, thậm chí có lúc còn hơi ngốc nữa, nhiều chuyện em phải nói ra anh mới hiểu, phải nhắc thì anh mới để ý. Có những lúc em cũng giận, cũng tủi thân, vì em nghĩ giá như anh tinh ý hơn một chút thì tốt biết mấy. Nhưng rồi nghĩ lại, em vẫn nhận ra rằng dù anh có ngốc nghếch trong cách thể hiện thế nào đi nữa, anh vẫn là người mà em muốn ở cạnh. Có lẽ vì ở bên anh, mọi thứ rất thật, không màu mè, không cố gắng trở thành một phiên bản hoàn hảo nào cả. Em có thể giận dỗi, có thể cằn nhằn, có thể nói nhiều đến mức chính em cũng thấy mình phiền, nhưng anh vẫn ở đó.

Valentine này em không muốn nói những lời quá hoa mỹ, em chỉ muốn nói thật lòng rằng ở bên anh em đã có rất nhiều cảm xúc, có lúc vui, có lúc buồn, có lúc bực mình đến mức chỉ muốn đánh anh một cái vì cái đầu ngốc của anh, nhưng cuối cùng thì em vẫn không muốn mất anh. Nếu có điều gì em mong ở anh, thì chỉ là sau này anh có thể hiểu em nhiều hơn một chút, để ý em nhiều hơn một chút, đừng để em lúc nào cũng phải nói ra hết mọi thứ. Nhưng dù sao đi nữa, em vẫn rất biết ơn vì anh đã xuất hiện trong cuộc đời em, vì giữa rất nhiều người ngoài kia, người đang ở cạnh em hôm nay lại là anh. Chúc anh một Valentine 14/3 thật vui, và nếu có thể thì hy vọng những Valentine sau này… người đứng cạnh anh vẫn sẽ là em.`

let i=0

function typeLetter(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i)

i++

setTimeout(typeLetter,30)

}

}

/* tim bay */

setInterval(function(){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),5000)

},300)

</script>

</body>
</html>
