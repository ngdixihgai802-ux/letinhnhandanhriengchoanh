<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Valentine bí mật</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:radial-gradient(circle,#1a0033,#000);
overflow:hidden;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:500px;
}

input{
padding:10px;
border-radius:10px;
border:none;
width:200px;
}

button{
margin:6px;
padding:10px 15px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#gift{
font-size:50px;
display:none;
cursor:pointer;
}

#quiz{
margin-top:20px;
}

#letter{
display:none;
line-height:1.6;
white-space:pre-line;
text-align:left;
}

.heart{
position:absolute;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.shake{
animation:shake 0.5s;
}

@keyframes shake{
0%{transform:translate(-50%,-50%)}
25%{transform:translate(-52%,-50%)}
50%{transform:translate(-48%,-50%)}
75%{transform:translate(-52%,-50%)}
100%{transform:translate(-50%,-50%)}
}

</style>
</head>

<body>

<div class="container" id="main">

<h1>💌 Valentine bí mật 💌</h1>

<div id="login">

<p>Nhập mật khẩu</p>

<input id="pass">

<br>

<button onclick="checkPass()">Vào</button>

</div>

<div id="gift" onclick="tapGift()">
🎁
<p>Bấm 100 lần để mở quà</p>
</div>

<div id="quiz"></div>

<div id="letter"></div>

</div>

<script>

/* tim bay */

setInterval(()=>{
let h=document.createElement("div")
h.className="heart"
h.innerHTML="💗"
h.style.left=Math.random()*100+"%"
h.style.fontSize=(20+Math.random()*20)+"px"
document.body.appendChild(h)

setTimeout(()=>h.remove(),6000)

},700)


/* mật khẩu */

function checkPass(){

let p=document.getElementById("pass").value

if(p==="28070808"){

document.getElementById("login").style.display="none"
document.getElementById("gift").style.display="block"

}else{

alert("Sai mật khẩu")

}

}

/* hộp quà */

let tap=0

function tapGift(){

tap++

document.getElementById("main").classList.add("shake")

setTimeout(()=>{
document.getElementById("main").classList.remove("shake")
},300)

if(tap>=100){

document.getElementById("gift").style.display="none"
startQuiz()

}

}

/* câu hỏi */

let q=0

let questions=[

{
q:"1. Món ăn em thích nhất là gì?",
a:["Gà rán","Khoai tây","Mì ý","Sushi"],
c:1
},

{
q:"2. Đồ uống em thích nhất là:",
a:["Trà đào","Matcha latte / socola","Cà phê sữa","Trà sữa"],
c:1
},

{
q:"3. Em thích anh gọi em bằng gì nhất?",
a:["Bé","Cục cưng","Công chúa nhỏ","Em yêu"],
c:2
},

{
q:"4. Khi em buồn, em muốn anh làm gì nhất?",
a:["Để em yên một mình","Nhắn 'ổn không'","Nhẹ nhàng dỗ dành, an ủi và quan tâm em","Mua đồ ăn cho em"],
c:2
},

{
q:"5. Đi chơi với em, em thích nhất là:",
a:["Đi xem phim","Đi ăn","Đi dạo","Đi trung tâm thương mại"],
c:1
},

{
q:"6. Điều em ghét nhất khi anh làm là:",
a:["Ít nhắn tin","Chơi game nhiều","Vô tâm, không nghe lời khi em khó chịu","Ngủ sớm"],
c:2
},

{
q:"7. Thể loại phim em thích là:",
a:["Hài","Hành động","Kinh dị / ngôn tình","Hoạt hình"],
c:2
},

{
q:"8. Điều nhỏ khiến em vui là:",
a:["Anh nhắn tin mỗi ngày","Anh nhớ ngày đặc biệt","Anh tạo bất ngờ cho em","Anh chọc em cười"],
c:2
},

{
q:"9. Nếu anh muốn làm em cảm động, anh nên:",
a:["Tặng quà đắt tiền","Dẫn em đi chơi xa","Làm điều bất ngờ cho em","Nhắn tin ngọt ngào"],
c:2
},

{
q:"10. Nếu anh tặng quà cho em thì:",
a:["Phải đúng thứ em thích","Phải là đồ đắt tiền","Chỉ cần là anh tặng thì em cũng thích","Không cần quà"],
c:2
}

]

function startQuiz(){
showQuestion()
}

function showQuestion(){

if(q>=questions.length){

showLetter()
return

}

let cur=questions[q]

let html="<h3>"+cur.q+"</h3>"

cur.a.forEach((ans,i)=>{
html+=`<button onclick="answer(${i})">${String.fromCharCode(65+i)}. ${ans}</button><br>`
})

document.getElementById("quiz").innerHTML=html

}

function answer(i){

if(i===questions[q].c){

q++
showQuestion()

}else{

alert("Sai rồi, thử lại nha")

}

}

/* thư */

let text=`Hôm nay là Valentine 14/3, ngày mà em muốn nói với anh những điều em vẫn luôn giữ trong lòng. Trong thế giới rộng lớn này, có hàng triệu người lướt qua nhau, nhưng thật may mắn vì em đã gặp được anh. Em vẫn luôn nghĩ rằng việc hai người gặp nhau, quen nhau rồi ở lại bên nhau không phải là chuyện hiển nhiên, nên đôi khi em cũng tự hỏi tại sao giữa rất nhiều người như vậy, em lại gặp đúng anh. Anh không phải kiểu người lãng mạn, cũng không giỏi nói những lời ngọt ngào, thậm chí có lúc còn hơi ngốc nữa, nhiều chuyện em phải nói ra anh mới hiểu, phải nhắc thì anh mới để ý. Có những lúc em cũng giận, cũng tủi thân, vì em nghĩ giá như anh tinh ý hơn một chút thì tốt biết mấy. Nhưng rồi nghĩ lại, em vẫn nhận ra rằng dù anh có ngốc nghếch trong cách thể hiện thế nào đi nữa, anh vẫn là người mà em muốn ở cạnh. Có lẽ vì ở bên anh, mọi thứ rất thật, không màu mè, không cố gắng trở thành một phiên bản hoàn hảo nào cả. Em có thể giận dỗi, có thể cằn nhằn, có thể nói nhiều đến mức chính em cũng thấy mình phiền, nhưng anh vẫn ở đó.

Valentine này em không muốn nói những lời quá hoa mỹ, em chỉ muốn nói thật lòng rằng ở bên anh em đã có rất nhiều cảm xúc, có lúc vui, có lúc buồn, có lúc bực mình đến mức chỉ muốn đánh anh một cái vì cái đầu ngốc của anh, nhưng cuối cùng thì em vẫn không muốn mất anh. Nếu có điều gì em mong ở anh, thì chỉ là sau này anh có thể hiểu em nhiều hơn một chút, để ý em nhiều hơn một chút, đừng để em lúc nào cũng phải nói ra hết mọi thứ. Nhưng dù sao đi nữa, em vẫn rất biết ơn vì anh đã xuất hiện trong cuộc đời em, vì giữa rất nhiều người ngoài kia, người đang ở cạnh em hôm nay lại là anh. Chúc anh một Valentine 14/3 thật vui, và nếu có thể thì hy vọng những Valentine sau này… người đứng cạnh anh vẫn sẽ là em.`

function showLetter(){

document.getElementById("quiz").style.display="none"

let box=document.getElementById("letter")

box.style.display="block"

let i=0

let inter=setInterval(()=>{

box.innerHTML+=text[i]

i++

if(i>=text.length) clearInterval(inter)

},20)

}

</script>

</body>
</html>
